name: PR Builds
on:
  - pull_request
  - workflow_dispatch

jobs:
  pr_build:
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.7", "3.8", "3.9", "3.10"]
        #poetry-version: ["1.0", "1.1.15"]
    runs-on: "ubuntu-latest"
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run image
        uses: abatilo/actions-poetry@v2
        with:
          poetry-version: 1.2
      - name: Install Package
        run: poetry install
      - name: Set AIT Config
        run: echo "AIT_CONFIG=./config/config.yaml" >> $GITHUB_ENV
      - name: Install tox-gh-actions
        #run: python -m pip install tox-gh-actions < 3
        run: poetry add tox-gh-actions < 3
      - name: Run Tox
        run: tox

      #- name: Run Unit Tests
        #run: poetry run pytest
      #- name: Run the docs build
        #run: poetry run sphinx-build doc/source doc/build
      #- name: Run the linting pipeline
        #run: python -m pre_commit run --color=always {posargs:--all}

