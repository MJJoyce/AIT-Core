name: PR Builds
on:
  - pull_request
  - workflow_dispatch

jobs:
  pr_build:
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.7", "3.8", "3.9", "3.10"]
        #poetry-version: ["1.0", "1.1.15"]
    runs-on: "ubuntu-latest"
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run image
        uses: abatilo/actions-poetry@v2
        with:
          poetry-version: 1.2
      #- name: Source Poetry Env
        #run: source $(poetry env info --path)/bin/activate
      - name: wtf_folder
        run: ls
      - name: Install Package
        run: poetry install
      - name: Set AIT Config
        run: echo "AIT_CONFIG=./config/config.yaml" >> $GITHUB_ENV
      - name: Run All The Checks
        run: poetry run pytest

